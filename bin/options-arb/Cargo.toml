[package]
name = "options-arb"
version = "0.1.0"
edition = "2021"

[dependencies]
common = { path = "../../crates/common" }
executor = { path = "../../crates/executor" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
anyhow = "1"
