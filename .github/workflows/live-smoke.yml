name: Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  smoke-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: options-arb-live-smoke

      - name: Run live smoke (blocking)
        run: ./scripts/run_live_smoke.sh

      - name: Upload smoke summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-manual
          path: artifacts/

  smoke-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: options-arb-live-smoke

      - name: Run live smoke (non-blocking nightly)
        run: ./scripts/run_live_smoke.sh

      - name: Upload smoke summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-nightly
          path: artifacts/
