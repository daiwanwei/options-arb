name: Storage Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  storage-integration:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: options_arb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d options_arb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/options_arb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: options-arb-storage-integration

      - name: Run storage integration tests
        run: cargo test -p storage --test storage_integration -- --nocapture

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-integration-logs
          path: target/debug/deps/
